<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습준비물 통합 현황 대시보드</title>
    <!-- Google Fonts: Outfit, Inter, Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 배경 글로우 효과 데코레이션 -->
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="app-container">
        <!-- 헤더 영역 -->
        <header>
            <div class="header-logo">
                <i class="fa-solid fa-boxes-packing logo-icon"></i>
                <div class="logo-text">
                    <h1>ReadyClass</h1>
                    <span>교실별 학습준비물 통합 현황</span>
                </div>
            </div>
            <div class="header-actions">
                <button id="btn-mock-auth" class="btn btn-secondary">
                    <i class="fa-solid fa-user-shield"></i> 교사 모드 전환
                </button>
                <button id="btn-add-class" class="btn btn-primary hidden-guest">
                    <i class="fa-solid fa-plus"></i> 새 교실 추가
                </button>
            </div>
        </header>

        <!-- 전체 요약 통계 대시보드 -->
        <section class="summary-section">
            <div class="summary-card">
                <div class="card-icon blue"><i class="fa-solid fa-school"></i></div>
                <div class="card-info">
                    <span class="label">총 학급 수</span>
                    <h3 id="stat-total-classes">-</h3>
                </div>
            </div>
            <div class="summary-card">
                <div class="card-icon green"><i class="fa-solid fa-circle-check"></i></div>
                <div class="card-info">
                    <span class="label">준비 완료 학급</span>
                    <h3 id="stat-ready-classes">-</h3>
                </div>
            </div>
            <div class="summary-card">
                <div class="card-icon red"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div class="card-info">
                    <span class="label">준비물 부족/미비</span>
                    <h3 id="stat-pending-classes">-</h3>
                </div>
            </div>
        </section>

        <!-- 메인 콘텐츠 영역: 교실 현황 그리드 -->
        <main class="grid-container" id="classroom-grid">
            <!-- 로딩 상태 표시 -->
            <div class="loading-spinner">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p>실시간 데이터를 로드하는 중입니다...</p>
            </div>
        </main>
    </div>

    <!-- 교실 추가 모달 -->
    <div id="modal-class" class="modal">
        <div class="modal-content">
            <span class="close-btn" data-modal="modal-class">&times;</span>
            <h2 id="class-modal-title"><i class="fa-solid fa-school-flag"></i> 새 교실 등록</h2>
            <form id="form-class">
                <input type="hidden" id="input-class-id">
                <div class="form-group">
                    <label for="input-class-name">학급 명</label>
                    <input type="text" id="input-class-name" placeholder="예: 3학년 1반" required>
                </div>
                <div class="form-group">
                    <label for="input-teacher-name">담임 교사</label>
                    <input type="text" id="input-teacher-name" placeholder="예: 홍길동" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">저장하기</button>
            </form>
        </div>
    </div>

    <!-- 준비물 관리 모달 (상세 보기 / 편집) -->
    <div id="modal-supplies" class="modal">
        <div class="modal-content modal-large">
            <span class="close-btn" data-modal="modal-supplies">&times;</span>
            <div class="modal-header-detail">
                <h2 id="detail-class-title"><i class="fa-solid fa-clipboard-list"></i> 준비물 상세 관리</h2>
                <p id="detail-teacher-name" class="sub-text">담임 교사: -</p>
            </div>

            <!-- 새 준비물 추가 폼 (교사 모드일 때만 표시) -->
            <div class="supply-add-section hidden-guest">
                <h3><i class="fa-solid fa-cart-plus"></i> 새 준비물 추가</h3>
                <form id="form-add-supply" class="inline-form">
                    <input type="text" id="input-supply-name" placeholder="준비물 이름 (예: 색종이)" required>
                    <input type="number" id="input-supply-qty" placeholder="수량" min="1" required>
                    <select id="input-supply-status">
                        <option value="needed" selected>❌ 미비</option>
                        <option value="pending">⚠️ 준비중</option>
                        <option value="ready">✅ 완료</option>
                    </select>
                    <button type="submit" class="btn btn-primary"><i class="fa-solid fa-plus"></i> 추가</button>
                </form>
            </div>

            <!-- 준비물 리스트 -->
            <div class="supply-list-container">
                <h3>준비물 현황 리스트</h3>
                <table class="supply-table">
                    <thead>
                        <tr>
                            <th>준비물 품목</th>
                            <th>필요 수량</th>
                            <th>준비 상태</th>
                            <th class="hidden-guest">관리 및 변경</th>
                        </tr>
                    </thead>
                    <tbody id="supply-list-body">
                        <!-- 동적으로 준비물 항목들이 들어갑니다 -->
                    </tbody>
                </table>
            </div>
            
            <div class="modal-actions hidden-guest" style="margin-top: 20px; text-align: right;">
                <button id="btn-delete-class" class="btn btn-danger">
                    <i class="fa-solid fa-trash-can"></i> 이 교실 삭제
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (v10) CDN -->
    <script src="app.js"></script>
</body>
</html>
